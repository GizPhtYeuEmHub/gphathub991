<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GizPhat Script Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090914;
color:white;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px,transparent 1px);
background-size:35px 35px;
opacity:.15;
animation:move 40s linear infinite;
z-index:-1;
}

@keyframes move{
0%{transform:translateY(0);}
100%{transform:translateY(-400px);}
}

.container{
width:95%;
max-width:420px;
margin:auto;
padding:30px 0;
}

.logo{
text-align:center;
}

.badge{
display:inline-block;
padding:10px 25px;
border:2px solid #8b5cf6;
border-radius:30px;
color:#c084fc;
font-weight:bold;
margin-bottom:20px;
}

h1{
font-size:45px;
text-align:center;
margin-bottom:10px;
}

h1 span{
color:#c084fc;
}

.desc{
text-align:center;
color:#aaa;
font-size:20px;
margin-bottom:30px;
}

.card{
background:#131320;
border-radius:25px;
overflow:hidden;
border:1px solid #2f2f4a;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.card img{
width:100%;
display:block;
}

.content{
padding:20px;
}

.tag{
display:inline-block;
padding:8px 18px;
background:#004d45;
border:1px solid #00ffd5;
border-radius:30px;
color:#7efbe5;
font-weight:bold;
margin-bottom:15px;
}

.game{
font-size:34px;
margin-bottom:10px;
}

.info{
color:#aaa;
font-size:20px;
line-height:1.5;
margin-bottom:20px;
}

button{
width:100%;
padding:18px;
font-size:24px;
font-weight:bold;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#00b894,#28d7c5);
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#00b894;
padding:15px 30px;
border-radius:15px;
display:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<div class="badge">ROBLOX SCRIPT HUB</div>
</div>

<h1>GizPhat <span>Script Hub</span></h1>

<p class="desc">
Select a game to get the script — copy with one click.
</p>

<div class="card">

<img src="grow.jpg">

<div class="content">

<div class="tag">SIMULATOR</div>

<div class="game">
Grow A Garden 2
</div>

<div class="info">
Auto farm, auto collect, speed hack and many other powerful features.
</div>

<button onclick="copyScript()">
⬆ Get Script
</button>

</div>

</div>

</div>

<div class="toast" id="toast">
✅ Script Copied!
</div>

<script>

function copyScript(){

navigator.clipboard.writeText(`loadstring(game:HttpGet("https://raw.githubusercontent.com/GizPhtYeuEmHub/GizPhatXTobi/refs/heads/main/GphatHubPrem"))()`);

document.getElementById("toast").style.display="block";

setTimeout(()=>{
document.getElementById("toast").style.display="none";
},2000);

}

</script>

</body>
  </html>
